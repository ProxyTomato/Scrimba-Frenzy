<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <title>Colour Scheme Generator</title>
</head>
<body>
    <div class="wrapper">
        <header>
            <form id="scheme-form">
                <input
                        id="colour-picker"
                        type="color"
                        value="#F55A5A"
                        aria-label="Choose a base color for the color scheme"
                />

                <select
                        name="scheme"
                        id="scheme-input"
                        aria-label="Select a color scheme mode"
                ></select>

                <button type="submit">Get colour scheme</button>
            </form>
        </header>
        <main class="colour-display" id="colour-display"></main>
    </div>
    <div class="snackbar" id="snackbar">Colour copied to the clipboard!</div>
</body>
</html>
