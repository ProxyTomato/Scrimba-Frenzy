<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jimmy's Diner</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"  defer="defer"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app" id="app">

        <!-- the main application and it gets seperated from pop-up else opacity will influence pop-up too-->
        <section class="order-section" id="order-section">

            <!-- I really want to use header tag for this one because, y'know, it is a header
                but I have problem with background-image so, I use img tag which automatically resize -->
            <img src="images/header.png" class="app-header"
                 alt="Image of burger from Jimmy's Diner with tagline the best burgers and pizzas in town.">

            <!-- this is where the menu card, which show food's name, ingredient and price, will be added to -->
            <menu id = "menu"></menu>

            <div class="order-container" id="order-container">
                <h1 class="order-header">Your Order</h1>

                <!-- -->
                <div class="order-info" id="order-info"></div>
                <button id="complete-btn">Complete Order</button>
            </div>


            <!-- A little card to show gratitude and notify customer that order is complete -->
            <div class="thank-you-popup" id="thank-you-popup"></div>
        </section>

        <!-- This popup only shows when the customer presses 'Complete' button otherwise it stays hidden -->
        <form class="card-details-popup" id="card-details-popup">
            <h1 class="card-details-popup-title">Enter card details</h1>
            <div class="input-list">

                <!-- accept any character because we don't know what type of langauge user will use -->
                <input
                        type="text"
                        name="name"
                        placeholder="Enter your name"
                        aria-label="customer's name"
                        required
                >

                <!-- only accept 12-digits-long string as the length of valid card number-->
                <input
                        type="text"
                        name="cardNumber"
                        placeholder="Enter card number"
                        aria-label="customer's cardNumber"
                        pattern="[0-9]{12}"
                        required
                >

                <!-- only accept 3-to-4-digits-long string as the length of valid CCV-->
                <input
                        type="text"
                        name="cvv"
                        placeholder="Enter CVV"
                        pattern="[0-9]{3}[0-9]?"
                        aria-label="customer's CVV"
                        required
                >
            </div>
            <button id="pay-btn">Pay</button>
        </form>
    </div>
</body>
</html>
